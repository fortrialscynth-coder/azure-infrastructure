---
- name: Configure Web Server
  hosts: webservers
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install nginx
      apt:
        name: nginx
        state: present

    - name: Start and enable nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Create index page
      copy:
        content: |
          <html>
            <body>
              <h1>Secure Azure Infrastructure</h1>
              <p>Deployed via Terraform and Ansible</p>
            </body>
          </html>
        dest: /var/www/html/index.html
